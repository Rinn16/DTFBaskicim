services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
        S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
        S3_BUCKET: ${S3_BUCKET:-dtf-uploads}
    container_name: dtf-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: dtf-worker
    restart: unless-stopped
    command: ["npx", "tsx", "scripts/export-worker.ts"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.0"

  postgres:
    image: postgres:16-alpine
    container_name: dtf-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dtf_baskicim}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-dtf_baskicim}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: dtf-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  minio:
    image: minio/minio:latest
    container_name: dtf-minio
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_CORS_ALLOW_ORIGIN: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  backup:
    image: postgres:16-alpine
    container_name: dtf-backup
    restart: "no"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-dtf_baskicim}
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/sh
    command: ["-c", "chmod +x /scripts/backup-db.sh /scripts/backup-cleanup.sh && /scripts/backup-db.sh && /scripts/backup-cleanup.sh"]
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backup_data:
