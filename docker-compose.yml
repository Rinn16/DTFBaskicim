services:
  postgres:
    image: postgres:16-alpine
    container_name: dtf-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dtf_user
      POSTGRES_PASSWORD: dtf_password
      POSTGRES_DB: dtf_baskicim
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dtf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: dtf-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: dtf_minio
      MINIO_ROOT_PASSWORD: dtf_minio_secret
      MINIO_CORS_ALLOW_ORIGIN: "http://localhost:3000"
    volumes:
      - minio_data:/data
    entrypoint: /bin/sh -c
    command:
      - |
        minio server /data --console-address ":9001" &
        until mc alias set local http://localhost:9000 dtf_minio dtf_minio_secret; do sleep 1; done
        mc mb --ignore-existing local/dtf-uploads
        mc anonymous set download local/dtf-uploads/uploads
        wait

volumes:
  postgres_data:
  redis_data:
  minio_data:
